name: Bug report
description: Report a reproducible problem in Open Claw City.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting. Please include enough detail to reproduce quickly."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered, minimal steps.
      placeholder: |
        1. Start service with ...
        2. Call endpoint ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, deploy mode.
    validations:
      required: true
